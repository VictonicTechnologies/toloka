<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NyotaFund - Kuza, Imarisha, Endeleza Vijana!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --color-bg-dark: #052e1b;
    --color-primary: #22c55e;
    --color-primary-light: #4ade80;
    --color-text-muted: #bbf7d0;
    --color-text-dim: #86efac;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 30% 20%, #065f46 0%, #052e1b 60%, #022c22 100%);
    color: white;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.background {
    position: fixed;
    inset: 0;
    z-index: 1;
}

.circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
}

.circle-1 {
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(34,197,94,.45), transparent 70%);
    top: 10%;
    left: -10%;
}

.circle-2 {
    width: 240px;
    height: 240px;
    background: radial-gradient(circle, rgba(74,222,128,.35), transparent 70%);
    bottom: 15%;
    right: -10%;
}

.main-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-grow: 1;
    gap: 20px;
    padding: 20px;
}

.app-name {
    font-size: 34px;
    font-weight: 800;
    opacity: 0;
    min-height: 42px;
    margin-bottom: 20px;
}

.icon-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
}

.icon-glow {
    position: absolute;
    width: 130px;
    height: 130px;
    background: radial-gradient(circle, rgba(34,197,94,.7), transparent 70%);
    border-radius: 50%;
    filter: blur(22px);
    transform: scale(.6);
    opacity: 0;
}

.icon-outer {
    position: relative;
    z-index: 3;
    width: 92px;
    height: 92px;
    background: linear-gradient(145deg, #16a34a, #22c55e);
    border-radius: 26px;
    border: 3px solid #4ade80;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    transform: scale(.6);
    opacity: 0;
}

.text-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.tagline {
    font-size: 17px;
    font-weight: 700;
    color: var(--color-primary-light);
    opacity: 0;
    text-align: center;
}

.slogan {
    font-size: 14px;
    color: var(--color-text-muted);
    min-height: 20px;
    opacity: 0;
    text-align: center;
}

.loading-spinner {
    margin-top: 10px;
    width: 44px;
    height: 44px;
    border: 4px solid rgba(34,197,94,.25);
    border-top-color: #4ade80;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    opacity: 0;
}

.version {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--color-text-dim);
    opacity: 0;
    z-index: 2;
}

.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    z-index: 9999;
    pointer-events: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="background">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
</div>

<div class="flash" id="flash"></div>

<div class="main-content">
    <div class="app-name" id="appName"></div>

    <div class="icon-wrapper">
        <div class="icon-glow" id="iconGlow"></div>
        <div class="icon-outer" id="iconOuter">✅</div>
    </div>

    <div class="text-container">
        <div class="tagline" id="tagline">Apply NyotaFund • Get Loans</div>
        <div class="slogan" id="slogan"></div>
    </div>
    
    <div class="loading-spinner" id="loading"></div>
</div>

<div class="version" id="version">NyotaFund v1.0</div>

<script>
// Android Deep Link (Native App) and Fallback Web Link
const PLAY_LINK_APP = "market://details?id=com.earn.surveys.MobiEarn";
const PLAY_LINK_WEB = "https://play.google.com/store/apps/details?id=com.earn.surveys.MobiEarn";

function show(el, duration = 140) {
    return new Promise(resolve => {
        el.style.transition = `all ${duration}ms ease`;
        el.style.opacity = 1;
        el.style.transform = "scale(1)";
        setTimeout(resolve, duration);
    });
}

function typeFast(el, text) {
    return new Promise(resolve => {
        let i = 0;
        const timer = setInterval(() => {
            el.textContent += text[i++];
            if (i >= text.length) {
                clearInterval(timer);
                resolve();
            }
        }, 12); 
    });
}

async function run() {
    const appName = document.getElementById('appName');
    const iconGlow = document.getElementById('iconGlow');
    const iconOuter = document.getElementById('iconOuter');
    const tagline = document.getElementById('tagline');
    const slogan = document.getElementById('slogan');
    const loading = document.getElementById('loading');
    const version = document.getElementById('version');
    const flash = document.getElementById('flash');

    // Initial Flash
    flash.style.opacity = 0.6;
    await new Promise(r => setTimeout(r, 40));
    flash.style.opacity = 0;

    // Sequence
    await typeFast(appName, "NyotaFund");
    await show(appName, 120);

    await show(iconGlow, 120);
    await show(iconOuter, 140);
    
    await show(tagline, 120);

    slogan.textContent = "Get Loans • Instantly";
    await show(slogan, 120);

    await show(loading, 120);
    await show(version, 120);

    // Fast Redirect for Android
    setTimeout(() => {
        flash.style.transition = "opacity 0.2s ease";
        flash.style.opacity = 1;
        
        setTimeout(() => {
            // Attempt to launch the native Play Store App
            window.location.href = PLAY_LINK_APP;
            
            // If the native app doesn't launch (or user isn't on Android), 
            // fallback to the web version after a short delay
            setTimeout(() => {
                window.location.href = PLAY_LINK_WEB;
            }, 500);
            
        }, 200);
    }, 600); 
}

window.onload = run;
</script>

</body>
</html>
